[[requirement]]
id = "spec.en.03.type_expressions.builtin_type_assertion_checker_bridge"
source = "doc/spec/en/03.type_system.md"
section = "3.3 Type Expressions"
stage = "type_elaboration"
status = "covered"
required = true
coverage = "pass_and_fail"
notes = "Task 109 supersedes the exact builtin-set portion of checker task 102 by carrying the source-derived `set` TypeExpression node from `BuiltinTypeAssertionPayloadBoundary: 1 is set` as a checker TypeExpressionInput before failing closed on the numeral numeric-type payload gap. Task 122 adds the exact reserved-variable `x is set` pass: the asserted type remains anchored to the formula-side source node and the checker accepts only normalized reflexive identity with the independently reserve-derived ready subject type. Task 138 composes the real direct local-mode-to-set expansion with the same formula-side asserted-set producer and accepts only normalized reflexive identity anchored at the real RHS. Tasks 145-146 add the direct builtin-object and one-edge builtin-set chain siblings; task 147 adds the one-edge builtin-object chain sibling; tasks 148-149 add the two-edge builtin-set and builtin-object chain siblings. Those implemented siblings preserve independent formula-side asserted sources and accept only terminal-RHS normalized reflexive identity. Task 150 adds the three-edge builtin-set chain sibling; it preserves raw outer-mode and independent formula-side builtin-set provenance, consumes all four real expansions, and accepts only terminal-set-RHS normalized reflexive identity. Task 151 adds the three-edge builtin-object chain sibling; it preserves raw outer-mode and independent formula-side builtin-object provenance, consumes all four real expansions, and accepts only terminal-object-RHS normalized reflexive identity without object/set coercion. Task 152 adds the four-edge builtin-set chain sibling; it preserves raw outermost-mode and independent formula-side builtin-set provenance, consumes all five real expansions, and accepts only terminal-set-RHS normalized reflexive identity. Task 153 adds the matching four-edge builtin-object sibling with the same five real expansions and terminal-object-RHS normalized reflexive identity without object/set coercion. Task 189 adds the direct written builtin-object reserve and independently formula-anchored builtin-object assertion sibling, accepting only one reserve-anchored normalized reflexive identity without reachability or object/set coercion. General reachability/widening, broader asserted types, attributes, arguments, facts, theorem acceptance, and proof/downstream payloads remain deferred."
