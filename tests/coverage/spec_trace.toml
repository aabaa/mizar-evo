 local-object-mode-chain inequality whose four raw outer-mode inputs normalize through all three real expansions to a terminal object-RHS identity. Task 138 adds the exact direct-local-mode subject plus formula-side builtin-set asserted type and consumes the real expansion to establish normalized reflexive identity. Task 139 adds the exact direct-local-mode left membership with independent right result and sole expected-set provenance, consumes one real expansion, and records two inferred terms plus one fact-free checked membership over one terminal-RHS builtin-set identity without a left expected type. Task 140 adds the exact direct local-object-mode left membership with independent right result and sole expected-set provenance, consumes one real expansion, and records two inferred terms plus one fact-free checked membership over distinct terminal-RHS builtin-object and explicit-reserve builtin-set identities without a left expected type. Task 141 adds the exact one-edge local-mode-chain left membership with independent right result and sole expected-set provenance, consumes both real expansions, and records two inferred terms plus one fact-free checked membership over one terminal-RHS builtin-set identity without a left expected type. Task 142 adds the exact one-edge local-object-mode-chain left membership with independent right result and sole expected-set provenance, consumes both real expansions, and records two inferred terms plus one fact-free checked membership over distinct terminal-RHS builtin-object and explicit-reserve builtin-set identities without a left expected type. Task 143 adds the exact two-edge set-terminal local-mode-chain left membership, consumes all three real expansions, and preserves one terminal-RHS builtin-set identity across the left result and right-only result/expected roles with no left expected type. Task 144 adds the exact two-edge object-terminal local-mode-chain left membership, consumes all three real expansions, and preserves distinct terminal-object-RHS builtin-object and explicit-reserve builtin-set identities across the left result and right-only result/expected roles with no left expected type. Task 145 adds the exact direct object-terminal local-mode reserved-variable type assertion, preserves the raw mode subject and independent formula-side builtin-object provenance, consumes one real expansion, and records normalized reflexive identity at the terminal object RHS without general reachability or object/set coercion. Task 146 adds the exact one-edge set-terminal local-mode-chain type assertion and consumes both real expansions to establish normalized reflexive identity at the terminal set RHS. Task 147 adds the matching one-edge object-terminal chain and consumes both real expansions to establish normalized reflexive identity at the terminal object RHS without general reachability or object/set coercion. Task 148 adds the two-edge set-terminal chain and consumes all three real expansions to establish normalized reflexive identity at the terminal set RHS without general reachability. Task 149 adds the matching object-terminal chain and consumes all three real expansions to establish normalized reflexive identity at the terminal object RHS without general reachability or object/set coercion. Task 150 adds the three-edge set-terminal chain and consumes all four real expansions to establish normalized reflexive identity at the terminal set RHS without general reachability. Task 151 adds the matching three-edge object-terminal chain and consumes all four real expansions to establish normalized reflexive identity at the terminal object RHS without general reachability or object/set coercion. Task 152 adds the four-edge set-terminal chain and consumes all five real expansions to establish normalized reflexive identity at the terminal set RHS without general reachability. Task 153 adds the matching four-edge object-terminal chain and all five real expansions to establish normalized reflexive identity at the terminal object RHS without general reachability or object/set coercion. Task 154 adds the three-edge set-terminal equality whose four raw result/expected roles normalize through all four real expansions to one terminal set-RHS identity. Task 155 adds the matching object-terminal equality whose four raw result/expected roles normalize through all four real expansions to one terminal object-RHS identity. Task 156 adds the three-edge set-terminal inequality whose four raw result/expected roles normalize through all four real expansions to one terminal set-RHS identity. Task 157 adds the matching object-terminal inequality whose four raw result/expected roles normalize through all four real expansions to one terminal object-RHS identity. None accepts or proves a theorem, records facts, materializes closure/order, performs inequality desugaring, or invents object/set coercion. Task 158 adds the three-edge set-terminal left membership, consumes all four real expansions, and preserves one terminal-RHS builtin-set identity across the raw outer-mode left result and right-only explicit-set result/expected roles with no left expected type. Task 159 adds the exact distinct-binding shared-reserve membership, preserves one written set range across both bindings and the three left-result/right-result/right-expected roles, and records a right-only expected constraint with no left expected type. Task 160 adds the exact active distinct-binding shared-reserve inequality contract, preserving the same written set range across both bindings and all four operand result/expected roles before one shared-source identity, two `Inferred` variables, and a fact-free pre-desugaring `Checked` inequality with two ordered constraints. Production routing, full near-miss/corruption coverage, and the real frontend/resolver sidecar guard the exact contract. Task 161 adds the exact active multiple-reserve-declaration inequality contract, preserving distinct written set ranges across the