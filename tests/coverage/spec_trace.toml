notes = "Tasks 119-169 add exact pass coverage for reserved-variable identifier terms whose binding and result/expected type payloads come from real source reserve declarations: equality and inequality own linked result/expected roles, membership owns two results and only the right expected-set role, and type assertion owns one ready result plus an independently source-anchored asserted type. Task 123 preserves distinct bindings over one shared multi-name set range; task 124 preserves two written set ranges across four raw inputs while they intern to one semantic identity; task 125 preserves a left object result plus right result/expected set inputs across two semantic identities; task 126 preserves four raw local-mode result/expected inputs while normalizing through the real direct bare-set expansion; task 127 preserves four raw outer-mode inputs while recursively consuming a real one-edge expansion chain to the terminal set RHS; task 128 preserves four raw object-mode inputs while consuming the real direct bare-object expansion and anchoring the normalized identity at its RHS; task 129 preserves four raw outer-mode inputs while consuming two real expansions and anchoring the normalized identity at the terminal object RHS; task 130 preserves four raw local-mode result/expected inputs while consuming one real expansion and anchoring the normalized identity at the terminal set RHS for pre-desugaring inequality; task 131 preserves four raw local object-mode result/expected inputs while consuming one real expansion and anchoring the normalized builtin-object identity at the terminal object RHS for the same pre-desugaring boundary; task 132 preserves four raw outer-mode result/expected inputs while consuming both real set-terminal chain links and anchoring the normalized builtin-set identity at the terminal RHS for that boundary; task 133 preserves four raw outer-mode result/expected inputs while consuming both real object-terminal chain links and anchoring the normalized builtin-object identity at the terminal RHS for the same boundary. Task 134 preserves four raw outer-mode inputs while recursively consuming three real two-edge set-terminal chain expansions and anchoring the normalized builtin-set identity at the terminal RHS. Task 135 preserves four raw outer-mode inputs while recursively consuming three real two-edge object-terminal chain expansions and anchoring the normalized builtin-object identity at the terminal RHS. Task 136 preserves four raw outer-mode inputs while recursively consuming three real two-edge set-terminal chain expansions and anchoring the normalized builtin-set identity at the terminal RHS for pre-desugaring inequality. Task 137 preserves four raw outer-mode inputs while recursively consuming three real two-edge object-terminal chain expansions and anchoring the normalized builtin-object identity at the terminal RHS for pre-desugaring inequality. Task 138 adds one raw local-mode subject result plus an independently source-anchored builtin-set asserted type, consumes the real direct expansion, and checks their normalized reflexive identity. Task 139 adds a raw local-mode left result plus independent right result and sole expected-set input, consumes one real expansion, and normalizes all three roles to one terminal-RHS builtin-set identity with no left expected type. Task 140 adds a raw local object-mode left result plus independent right result and sole expected-set input, consumes one real expansion, and preserves distinct terminal-RHS builtin-object and explicit-reserve builtin-set identities with no left expected type. Task 141 adds a raw outer-mode left result plus independent right result and sole expected-set input, consumes both real one-edge chain expansions, and normalizes all three roles to one terminal-RHS builtin-set identity with no left expected type. Task 142 adds a raw outer-mode left result plus independent right result and sole expected-set input, consumes both real one-edge object-terminal chain expansions, and preserves distinct terminal-RHS builtin-object and explicit-reserve builtin-set identities with no left expected type. Task 143 adds the exact two-edge set-terminal local-mode-chain left membership, consumes all three real expansions, and preserves one terminal-RHS builtin-set identity across the left result and right-only result/expected roles with no left expected type. Task 144 adds the exact two-edge object-terminal local-mode-chain left membership, consumes all three real expansions, and preserves distinct terminal-object-RHS builtin-object and explicit-reserve builtin-set identities across the left result and right-only result/expected roles with no left expected type. Task 145 adds the exact direct object-terminal local-mode reserved-variable type assertion, preserves the raw mode subject and independent formula-side builtin-object provenance, consumes one real expansion, and records normalized reflexive identity at the terminal object RHS without general reachability or object/set coercion. Task 146 adds the exact one-edge set-terminal local-mode-chain type assertion, consumes both real expansions, and checks normalized reflexive identity at the terminal set RHS. Task 147 adds the matching one-edge object-terminal chain, consuming both real expansions and checking normalized reflexive identity at the terminal object RHS without general reachability or object/set coercion. Task 148 adds the two-edge set-terminal chain, consuming all three real expansions and checking normalized reflexive identity at the terminal set RHS without general reachability. Task 149 adds the matching object-terminal chain, consuming all three real expansions and checking normalized reflexive identity at the terminal object RHS without general reachability or object/set coercion. Task 150 adds the three-edge set-terminal chain, consumes all four real expansions, and checks normalized reflexive identity at the terminal set RHS without general reachability. Task 151 adds the matching three-edge object-terminal chain, consumes all four real expansions, and checks normalized reflexive identity at the terminal object RHS without general reachability or object/set coercion. Task 152 adds the four-edge set-terminal chain, consumes all five real expansions, and checks normalized reflexive identity at the terminal set RHS without general reachability. Task 153 adds the matching four-edge object-terminal chain with the raw outermost-mode subject and independent formula-side builtin-object source, consumes all five real expansions, and checks terminal object-RHS normalized reflexive identity without general reachability or object/set coercion. Task 154 adds the three-edge set-terminal equality with four raw outer-mode result/expected inputs, all four real expansions, and one terminal set-RHS normalized identity. Task 155 adds the matching three-edge object-terminal equality with four raw outer-mode result/expected inputs, all four real expansions, and one terminal object-RHS normalized identity. Task 156 adds the three-edge set-terminal inequality with four raw outer-mode result/expected inputs, all four real expansions, and one terminal set-RHS normalized identity for pre-desugaring inequality. Task 157 adds the matching object-terminal inequality with four raw outer-mode result/expected inputs, all four real expansions, and one terminal object-RHS normalized identity for pre-desugaring inequality. Task 158 adds the three-edge set-terminal left membership, consumes all four real expansions, and preserves one terminal-RHS builtin-set identity across the raw outer-mode left result and right-only explicit-set result/expected roles with no left expected type. Task 159 adds the exact distinct-binding shared-reserve membership, preserves one written set range across both bindings and the three left-result/right-result/right-expected roles, and records a right-only expected constraint with no left expected type. Task 160 adds the exact