cal-mode-chain left membership, consumes all three real expansions, and preserves one terminal-RHS builtin-set identity across the left result and right-only result/expected roles with no left expected type. Task 144 adds the exact two-edge object-terminal local-mode-chain left membership, consumes all three real expansions, and preserves distinct terminal-object-RHS builtin-object and explicit-reserve builtin-set identities across the left result and right-only result/expected roles with no left expected type. Task 145 adds the exact direct object-terminal local-mode reserved-variable type assertion, preserves the raw mode subject and independent formula-side builtin-object provenance, consumes one real expansion, and records normalized reflexive identity at the terminal object RHS without general reachability or object/set coercion. Task 146 adds the exact one-edge set-terminal local-mode-chain type assertion, consumes both real expansions, and keeps one fact-free Checked TypeAssertion over the terminal set-RHS identity. Task 147 adds the matching one-edge object-terminal chain and one fact-free Checked TypeAssertion over the terminal object-RHS identity without general reachability or object/set coercion. Task 148 adds the two-edge set-terminal chain and one fact-free Checked TypeAssertion over the terminal set-RHS identity without general reachability. Task 149 adds the matching object-terminal chain and one fact-free Checked TypeAssertion over the terminal object-RHS identity without general reachability or object/set coercion. Task 150 adds the three-edge set-terminal chain and one fact-free Checked TypeAssertion over the terminal set-RHS identity without general reachability. Task 151 adds the matching three-edge object-terminal chain and one fact-free Checked TypeAssertion over the terminal object-RHS identity without general reachability or object/set coercion. Task 152 adds the four-edge set-terminal chain and one fact-free Checked TypeAssertion over the terminal set-RHS identity without general reachability. Task 153 adds the matching four-edge object-terminal chain and one fact-free Checked TypeAssertion over the terminal object-RHS identity without general reachability or object/set coercion. Task 154 adds the three-edge set-terminal equality and one fact-free Checked Equality over a single terminal set-RHS identity after all four real expansions. Task 155 adds the matching object-terminal equality and one fact-free Checked Equality over a single terminal object-RHS identity after all four real expansions. Task 156 adds the three-edge set-terminal inequality and one fact-free pre-desugaring Checked Inequality over a single terminal set-RHS identity after all four real expansions. Task 157 adds the matching object-terminal inequality and one fact-free pre-desugaring Checked Inequality over a single terminal object-RHS identity after all four real expansions. Task 158 adds the three-edge set-terminal left membership, consumes all four real expansions, and preserves one terminal-RHS builtin-set identity across the raw outer-mode left result and right-only explicit-set result/expected roles with no left expected type. Task 159 adds the exact distinct-binding shared-reserve membership, preserves one written set range across both bindings and the three left-result/right-result/right-expected roles, and records a right-only expected constraint with no left expected type. Task 160 adds the exact active distinct-binding shared-reserve inequality contract, preserving the same written set range across both bindings and all four operand result/expected roles before one shared-source identity, two `Inferred` variables, and a fact-free pre-desugaring `Checked` inequality with two ordered constraints. Production routing, full near-miss/corruption coverage, and the real frontend/resolver sidecar guard the exact contract. Task 161 adds the exact active multiple-reserve-declaration inequality contract, preserving distinct written s