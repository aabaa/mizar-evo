ng four-edge object-terminal left membership, consumes all five real expansions, and preserves distinct terminal-object-RHS builtin-object and explicit-reserve builtin-set identities across the raw outermost-mode left result and right-only explicit-set result/expected roles with no left expected type or object/set coercion. Task 166 adds the four-edge set-terminal equality with four raw outermost-mode result/expected inputs, consumes all five real expansions, and preserves one terminal-set-RHS normalized identity before two Inferred variables, one fact/deferred-free Checked Equality, and two ordered operand-owned expected constraints. Task 167 adds the matching four-edge object-terminal equality with four raw outermost-mode result/expected inputs, consumes all five real expansions, and preserves one terminal-object-RHS normalized identity before two Inferred variables, one fact/deferred-free Checked Equality, and two ordered operand-owned expected constraints without object/set coercion. Task 168 adds the four-edge set-terminal inequality with four raw outermost-mode result/expected inputs, consumes all five real expansions, and preserves one terminal-set-RHS normalized identity before two Inferred variables, one fact/deferred-free pre-desugaring Checked Inequality, and two ordered operand-owned expected constraints. Task 169 adds the matching four-edge object-terminal inequality with four raw outermost-mode result/expected inputs, consumes all five real expansions, and preserves one terminal-object-RHS normalized identity before two Inferred variables, one fact/deferred-free pre-desugaring Checked Inequality, and two ordered operand-owned expected constraints without object/set coercion. Task 122 checks only normalized reflexive identity. Task 111 supersedes task 105 only for the exact `SetEnumerationPayloadBoundary: {1, 2} = {1, 2}` source by passing real checker payloads for four numeral item terms and two set-enumeration terms before failing closed on missing numeric and result-type payloads. Broader identifier, numeral, functor, type reachability/widening, coercion, and set-enumeration term extraction and semantics remain deferred."

