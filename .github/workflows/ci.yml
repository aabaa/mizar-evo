name: CI

on:
  push:
  pull_request:

jobs:
  mizar-test:
    name: mizar-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Validate test corpus metadata
        run: cargo run -p mizar-test -- plan --tests-root tests --manifest tests/coverage/spec_trace.toml
